<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}
.container {
  width: 100%;
  max-width: 500px;
}
.card {
  width: 100%;
  aspect-ratio: 3/4;
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}
.card.flipped {
  transform: rotateY(180deg);
}
.card-front, .card-back {
  width: 100%;
  height: 100%;
  position: absolute;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border-radius: 16px;
  padding: 30px 20px;
}
.card-front {
  background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
  z-index: 1;
}
.card-back {
  background: linear-gradient(135deg, #fef3c7 0%, #fcd34d 50%, #f59e0b 100%);
  z-index: 1;
}
.deco-large {
  position: absolute;
  opacity: 0.6;
  font-size: 120px;
}
.deco-top-right {
  top: -20px;
  right: -20px;
}
.deco-bottom-left {
  bottom: -20px;
  left: -20px;
}
.deco-small {
  position: absolute;
  font-size: 40px;
  opacity: 0.4;
}
.deco-right {
  top: 15px;
  right: 15px;
}
.deco-left {
  bottom: 20px;
  left: 15px;
}
.front-content {
  position: relative;
  z-index: 2;
}
h1 {
  font-size: 36px;
  color: #ffffff;
  margin: 0 0 15px 0;
  font-weight: bold;
  line-height: 1.2;
}
.subtitle {
  font-size: 18px;
  color: #e0e7ff;
  margin: 0;
  font-weight: normal;
}
.tap {
  font-size: 12px;
  color: #c7d2fe;
  margin: 15px 0 0 0;
  font-style: italic;
}
.back-content {
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100%;
  position: relative;
  z-index: 2;
}
.back-message {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.back-message h2 {
  font-size: 20px;
  color: #78350f;
  margin: 0 0 20px 0;
  font-weight: bold;
  line-height: 1.3;
}
.back-message p {
  font-size: 14px;
  color: #92400e;
  line-height: 1.5;
  margin: 0 0 15px 0;
}
.back-message p:last-child {
  margin: 0;
}
.back-footer {
  text-align: center;
  padding-top: 20px;
}
#from-text {
  font-size: 14px;
  color: #78350f;
  margin: 0;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="container">
  <div class="card" onclick="flipCard()">
    <!-- Front -->
    <div class="card-front">
      <div class="deco-large deco-top-right">🔧</div>
      <div class="deco-large deco-bottom-left">🏠</div>
      <div class="deco-small deco-right">⚙️</div>
      <div class="deco-small deco-left">🏆</div>
      <div class="front-content">
        <h1>Happy Father's Day</h1>
        <p class="subtitle">Hope you have a great one</p>
        <p class="tap">Tap to open</p>
      </div>
    </div>

    <!-- Back -->
    <div class="card-back">
      <div class="back-content">
        <div class="back-message">
          <h2>Thanks for everything you do</h2>
          <p>Whether it's the advice, the support, or just being there — I appreciate it.</p>
          <p>Wishing you a day full of relaxation and things you enjoy.</p>
        </div>
        <div class="back-footer">
          <p id="from-text">With Love,<br>Melissa</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function flipCard() {
  const card = document.querySelector('.card');
  card.classList.toggle('flipped');
}
</script>
</body>
</html>
