<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day</title>
<style>
body {
  margin: 0;
  padding: 10px;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container {
  max-width: 100%;
  width: 100%;
}
.card-wrapper {
  perspective: 1000px;
  position: relative;
  max-width: 500px;
  margin: 0 auto;
}
#card {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  touch-action: manipulation;
}
#card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
  border-radius: 16px;
  padding: 25px 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
  transform: rotateY(180deg);
  backface-visibility: hidden;
  pointer-events: none;
  overflow: hidden;
  box-sizing: border-box;
}
.deco {
  position: absolute;
  font-size: 40px;
  opacity: 0.4;
}
.deco-right {
  top: 15px;
  right: 15px;
}
.deco-left {
  bottom: 20px;
  left: 15px;
}
h1 {
  font-size: 36px;
  color: #ffffff;
  margin: 0 0 15px 0;
  font-weight: bold;
  line-height: 1.2;
  position: relative;
  z-index: 10;
}
.subtitle {
  font-size: 18px;
  color: #e0e7ff;
  margin: 0;
  font-weight: normal;
  position: relative;
  z-index: 10;
}
.tap {
  font-size: 12px;
  color: #c7d2fe;
  margin: 15px 0 0 0;
  font-style: italic;
  position: relative;
  z-index: 10;
}
#card-back h2 {
  font-size: 20px;
  color: #1f2937;
  margin: 0 0 20px 0;
  font-weight: bold;
  line-height: 1.3;
}
#card-back p {
  font-size: 14px;
  color: #374151;
  line-height: 1.5;
  margin: 0 0 15px 0;
}
#from-text {
  font-size: 14px;
  color: #1f2937;
  margin: 0;
  font-weight: bold;
}
.bottom {
  margin-top: auto;
  padding-top: 15px;
}
</style>
</head>
<body>
<div class="container">
  <div class="card-wrapper">
    <div id="card" onclick="flipCard()">
      <div class="deco deco-right">🎯</div>
      <div class="deco deco-left">🏆</div>
      <h1>Happy Father's Day</h1>
      <p class="subtitle">Hope you have a great one</p>
      <p class="tap">Tap to open</p>
    </div>
    <div id="card-back">
      <h2>Thanks for everything you do</h2>
      <p>Whether it's the advice, the support, or just being there — I appreciate it.</p>
      <p>Wishing you a day full of relaxation and things you enjoy.</p>
      <div class="bottom">
        <p id="from-text">With Love,</p>
      </div>
    </div>
  </div>
</div>

<script>
let isFlipped = false;

function flipCard() {
  const card = document.getElementById('card');
  const cardBack = document.getElementById('card-back');

  isFlipped = !isFlipped;

  if (isFlipped) {
    card.style.transform = 'rotateY(180deg)';
    cardBack.style.pointerEvents = 'auto';
  } else {
    card.style.transform = 'rotateY(0deg)';
    cardBack.style.pointerEvents = 'none';
  }
}
</script>
</body>
</html>
